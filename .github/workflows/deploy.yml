name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps (retry)
        run: |
          for i in 1 2 3; do npm ci && exit 0; echo "npm ci attempt $i failed; retrying in 20s"; sleep 20; done; exit 1
      - name: Build
        env:
          BASE_PATH: /RedDeviz
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d3.outputs.page_url || steps.d2.outputs.page_url || steps.d1.outputs.page_url }}
    steps:
      - id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 1200000
      - if: steps.d1.outcome == 'failure'
        run: sleep 20
      - id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 1200000
      - if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 45
      - id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 1200000
